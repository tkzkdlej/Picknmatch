    <main>
      <div class="page-header">
        <h1 class="page-title">헤드헌팅 의뢰</h1>
        <p class="page-tagline">기업의 성장과 인재의 비전을 잇는 단단한 연결 고리, 픽앤매치</p>
      </div>
      <section class="section section-form">
        <div class="container">
          <div class="form-box">
            <form class="request-form" data-type="headhunting">
              <div class="form-row">
                <input type="text" name="company" placeholder="회사명" required />
                <input type="text" name="name" placeholder="담당자명" required />
              </div>
              <div class="form-row">
                <input type="tel" name="phone" placeholder="연락처" required />
                <input type="email" name="email" placeholder="이메일" required />
              </div>
              <div class="form-row">
                <input type="text" name="position" placeholder="포지션명 *" required />
                <input type="text" name="industry" placeholder="산업/직무 *" required />
              </div>
              <div class="form-row">
                <input type="text" name="salary" placeholder="예상 연봉 범위" />
                <select name="urgency">
                  <option value="">채용 시급도 선택</option>
                  <option value="긴급">긴급</option>
                  <option value="보통">보통</option>
                  <option value="여유">여유</option>
                </select>
              </div>
              <textarea name="content" placeholder="상세 내용 (채용 인원, 요건, 희망 일정 등)" rows="5"></textarea>
              <button type="submit" class="btn btn-primary btn-full">의뢰하기</button>
            </form>
          </div>
        </div>
      </section>
    </main>
