# picknmatch.co.kr — 301 리다이렉트 (Nginx)
# server { ... } 블록 안에 include 로 넣습니다(try_files·index 처리보다 먼저 오도록 상단 권장).
#   include /path/to/nginx-redirects.conf;
#
# 1) 구 평면 URL → 카테고리 경로
rewrite ^/greeting/?$ /about-us/greeting permanent;
rewrite ^/introduce/?$ /about-us/introduce permanent;
rewrite ^/members/?$ /about-us/members permanent;
rewrite ^/location/?$ /about-us/location permanent;
rewrite ^/strength/?$ /client/strength permanent;
rewrite ^/headhunting/?$ /client/headhunting permanent;
rewrite ^/reference/?$ /client/reference permanent;
rewrite ^/recruitment/?$ /client/recruitment permanent;
rewrite ^/career/?$ /client/career permanent;
rewrite ^/achievement/?$ /client/achievement permanent;
rewrite ^/request-headhunting/?$ /client/request-headhunting permanent;
rewrite ^/request-recruitment/?$ /client/request-recruitment permanent;
rewrite ^/request-career/?$ /client/request-career permanent;
rewrite ^/request-reference/?$ /client/request-reference permanent;
rewrite ^/resume/?$ /position/resume permanent;

# 2) 끝 슬래시 제거
rewrite ^/main/$ /main permanent;
rewrite ^/about-us/greeting/$ /about-us/greeting permanent;
rewrite ^/about-us/introduce/$ /about-us/introduce permanent;
rewrite ^/about-us/members/$ /about-us/members permanent;
rewrite ^/about-us/location/$ /about-us/location permanent;
rewrite ^/client/strength/$ /client/strength permanent;
rewrite ^/client/headhunting/$ /client/headhunting permanent;
rewrite ^/client/reference/$ /client/reference permanent;
rewrite ^/client/recruitment/$ /client/recruitment permanent;
rewrite ^/client/career/$ /client/career permanent;
rewrite ^/client/request-headhunting/$ /client/request-headhunting permanent;
rewrite ^/client/request-recruitment/$ /client/request-recruitment permanent;
rewrite ^/client/request-reference/$ /client/request-reference permanent;
rewrite ^/client/request-career/$ /client/request-career permanent;
rewrite ^/client/achievement/$ /client/achievement permanent;
rewrite ^/position/$ /position permanent;
rewrite ^/position/resume/$ /position/resume permanent;
rewrite ^/privacy/$ /privacy permanent;
rewrite ^/terms/$ /terms permanent;
